<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f39c12"/>
      <stop offset="100%" stop-color="#e74c3c"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8d030"/>
      <stop offset="100%" stop-color="#ffe066"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.3" cy="0.3" r="0.7">
      <stop offset="0%" stop-color="rgba(255,255,255,0.25)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>
  <!-- Circle background -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <!-- Subtle glow -->
  <circle cx="256" cy="256" r="256" fill="url(#glow)"/>
  <!-- Decorative bubbles -->
  <circle cx="120" cy="130" r="18" fill="rgba(255,255,255,0.12)"/>
  <circle cx="80" cy="200" r="10" fill="rgba(255,255,255,0.08)"/>
  <circle cx="400" cy="380" r="14" fill="rgba(255,255,255,0.1)"/>
  <circle cx="420" cy="320" r="8" fill="rgba(255,255,255,0.07)"/>
  <!-- Pokeball divider line -->
  <rect x="60" y="248" width="392" height="16" rx="8" fill="rgba(26,26,46,0.3)"/>
  <!-- Pokeball center circle -->
  <circle cx="256" cy="256" r="52" fill="rgba(26,26,46,0.35)" stroke="rgba(255,255,255,0.3)" stroke-width="6"/>
  <circle cx="256" cy="256" r="28" fill="#fff" opacity="0.9"/>
  <!-- Dragon wing silhouette (left) -->
  <path d="M100 340 Q90 260 140 200 Q160 240 150 290 Q170 250 190 220 Q195 270 180 310 Z"
        fill="#7038f8" opacity="0.7"/>
  <!-- Lightning bolt (right) -->
  <path d="M340 160 L310 260 L350 250 L320 360 L380 230 L340 240 Z"
        fill="url(#bolt)" opacity="0.85"/>
  <!-- Letter J -->
  <text x="256" y="272" text-anchor="middle" dominant-baseline="central"
        font-family="'Segoe UI',system-ui,sans-serif" font-weight="800" font-size="80"
        fill="#1a1a2e" opacity="0.6">J</text>
</svg>
